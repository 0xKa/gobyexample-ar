name: test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    name: Translation and build checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum

    - name: Validate translation and generated site
      run: tools/build
      env:
        VERBOSE: 1
        TESTING: 1

    - name: Verify clean build
      run: git diff --exit-code
